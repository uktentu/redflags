<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create stunning Instagram posts with tweet-style quotes for redflags.exe">
  <title>redflags.exe — Post Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <!-- Left Panel: Controls -->
    <aside class="controls-panel" id="controlsPanel">
      <div class="controls-header">
        <div class="logo-mark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#e63946" />
            <path d="M2 17L12 22L22 17" stroke="#e63946" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M2 12L12 17L22 12" stroke="#e63946" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <h1>Post Maker</h1>
        <span class="badge">redflags.exe</span>
      </div>

      <!-- Quote Input -->
      <div class="control-group">
        <label for="quoteInput">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          Quote Text
        </label>
        <textarea id="quoteInput" rows="5"
          placeholder="Type your quote here...&#10;&#10;Use line breaks for formatting.">If being sexy was a crime,
you'd be serving life...
and
I'd still volunteer as your cellmate.</textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>
      </div>

      <!-- Display Name -->
      <div class="control-group">
        <label for="displayName">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Display Name
        </label>
        <input type="text" id="displayName" value="redflags.exe" placeholder="Your display name">
      </div>

      <!-- Handle -->
      <div class="control-group">
        <label for="handleName">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4" />
            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" />
          </svg>
          Handle
        </label>
        <input type="text" id="handleName" value="@redflags.exe" placeholder="@yourhandle">
      </div>

      <!-- Profile Photo -->
      <div class="control-group">
        <label>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Profile Photo
        </label>
        <div class="photo-upload-area" id="photoUploadArea">
          <img id="profilePreview" src="" alt="Profile preview" style="display:none;">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <span>Drop image or click to upload</span>
          </div>
          <input type="file" id="profileUpload" accept="image/*" hidden>
        </div>
      </div>

      <!-- Verified Badge Toggle -->
      <div class="control-group">
        <label>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          Options
        </label>
        <div class="toggle-row">
          <span>Verified Badge</span>
          <label class="toggle-switch">
            <input type="checkbox" id="verifiedToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Font Family -->
      <div class="control-group">
        <label for="fontFamily">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7" />
            <line x1="9" y1="20" x2="15" y2="20" />
            <line x1="12" y1="4" x2="12" y2="20" />
          </svg>
          Quote Font
        </label>
        <select id="fontFamily">
          <option value="Montserrat" selected>Montserrat</option>
          <option value="Inter">Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Poppins">Poppins</option>
          <option value="Outfit">Outfit</option>
          <option value="Space Grotesk">Space Grotesk</option>
          <option value="DM Sans">DM Sans</option>
          <option value="Playfair Display">Playfair Display</option>
          <option value="Lora">Lora</option>
          <option value="Oswald">Oswald</option>
          <option value="Raleway">Raleway</option>
          <option value="Nunito">Nunito</option>
          <option value="Bebas Neue">Bebas Neue</option>
          <option value="Cabin">Cabin</option>
        </select>
      </div>

      <!-- Font Size -->
      <div class="control-group">
        <label for="fontSizeSlider">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7" />
            <line x1="9" y1="20" x2="15" y2="20" />
            <line x1="12" y1="4" x2="12" y2="20" />
          </svg>
          Quote Font Size: <span id="fontSizeValue">32</span>px
        </label>
        <input type="range" id="fontSizeSlider" min="20" max="52" value="32" class="slider">
      </div>

      <!-- Quote Vertical Position -->
      <div class="control-group">
        <label for="positionSlider">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <polyline points="19 12 12 19 5 12" />
          </svg>
          Vertical Position: <span id="positionValue">40</span>%
        </label>
        <input type="range" id="positionSlider" min="30" max="90" value="40" class="slider">
      </div>

      <!-- Download Button -->
      <button class="download-btn" id="downloadBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download Post
      </button>
      <p class="download-note">Exports as 1080×1920 PNG (Instagram Story size)</p>
    </aside>

    <!-- Right Panel: Preview -->
    <main class="preview-panel">
      <div class="preview-header">
        <h2>Live Preview</h2>
        <div class="preview-dimensions">1080 × 1920</div>
      </div>
      <div class="preview-wrapper">
        <div class="canvas-container" id="canvasContainer">
          <canvas id="postCanvas" width="1080" height="1920"></canvas>
        </div>
      </div>
    </main>
  </div>

  <!-- Hidden canvas for full-res export -->
  <canvas id="exportCanvas" width="1080" height="1920" style="display:none;"></canvas>

  <script src="app.js"></script>
</body>

</html>
