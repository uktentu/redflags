name: Instagram Auto Poster

on:
  schedule:
    # Runs 10 times a day (UTC time). 
    # Example below runs at roughly every ~2 hours starting at 06:00 UTC
    - cron: '30 6,8,10,12,14,16,18,20,22,23 * * *'
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./automation
        run: npm install

      - name: Run Automation Script
        working-directory: ./automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: node index.js
